<!DOCTYPE html>
<html>
<head>
    <title>Blake Health & Strength Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 0; margin: 0; }
        .header { padding: 15px; background: #1a1a1a; border-bottom: 2px solid #00ff00; }
        
        /* Tab Navigation */
        .tabs { display: flex; background: #1e1e1e; border-bottom: 2px solid #333; }
        .tab { flex: 1; padding: 15px; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; transition: 0.2s;}
        .tab.active { color: #00ff00; border-bottom: 3px solid #00ff00; background: #252525; }
        
        .view-section { padding: 15px; display: none; }
        .view-section.active { display: block; }

        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .big-metric { font-size: 5rem; font-weight: bold; color: #00ff00; font-family: monospace; margin: 15px 0; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 5px 0; transition: 0.2s; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #ff4444; color: white; }
        .btn-green { background: #28a745; color: white; }
        
        .section-label { display: block; text-align: left; font-size: 0.85rem; color: #aaa; margin-top: 5px; text-transform: uppercase;}
        .status-text { font-size: 1rem; margin: 10px 0; color: #aaa; }
        
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; font-size: 0.9rem;}
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #252525; color: #00ff00; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Blake Health & Strength</h2>
    </div>

    <div class="tabs">
        <div id="nav-timer" class="tab active" onclick="switchTab('timer')">Timer</div>
        <div id="nav-history" class="tab" onclick="switchTab('history')">History</div>
        <div id="nav-settings" class="tab" onclick="switchTab('settings')">Settings</div>
    </div>

    <div id="view-timer" class="view-section active">
        
        <div class="card" id="connectionCard">
            <button class="btn-blue" id="connectBtn" onclick="connectDevice()">CONNECT SPEED GATES</button>
            <div id="status" class="status-text">Status: Disconnected ❌</div>
        </div>

        <div class="card">
            <label class="section-label">Select Athlete & Event</label>
            <select id="athleteSelect"></select>
            <input type="text" id="eventName" placeholder="Event (e.g., 40yd Dash, 10yd Split)">
        </div>

        <div class="card">
            <label class="section-label">Gate Mode (0 = Use Gate 2 to stop)</label>
            <input type="number" id="splitTarget" value="0" min="0" title="Set to 1 or more for single-gate split drills">
            
            <div class="big-metric" id="speedDisplay">0.000</div>
            
            <button class="btn-red" onclick="resetSpeed()">Reset Timer</button>
        </div>
    </div>

    <div id="view-history" class="view-section">
        <div class="card" style="padding: 10px;">
            <table>
                <thead><tr><th>Athlete</th><th>Event</th><th>Time</th></tr></thead>
                <tbody id="historyTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="view-settings" class="view-section">
        
        <div class="card">
            <label class="section-label">Google Sheets Integration</label>
            <p style="font-size: 0.8rem; color: #888; text-align: left; margin: 5px 0;">Paste your Web App URL here. It will auto-save to your device.</p>
            <input type="text" id="sheetsUrlInput" placeholder="https://script.google.com/macros/s/..." onchange="saveUrl()">
        </div>

        <div class="card">
            <label class="section-label">Roster Management</label>
            <input type="text" id="newName" placeholder="New Athlete Name...">
            <button class="btn-green" onclick="addAthlete()">Add to Roster</button>
            <button class="btn-red" style="margin-top: 15px; opacity: 0.8;" onclick="clearRoster()">Clear Entire Roster</button>
        </div>

    </div>

    <script>
        let startTime, timerInterval, splitTimes = [];
        let roster = JSON.parse(localStorage.getItem('bhs_roster')) || ["Demo Athlete"];

        // --- Initialization ---
        window.onload = function() {
            const savedUrl = localStorage.getItem('bhs_sheetsUrl');
            if (savedUrl) document.getElementById('sheetsUrlInput').value = savedUrl;
            updateRosterUI();
        };

        // --- Tab Navigation ---
        function switchTab(tabName) {
            // Reset all tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            
            // Activate selected
            document.getElementById('nav-' + tabName).classList.add('active');
            document.getElementById('view-' + tabName).classList.add('active');
        }

        // --- Settings & Roster (Auto-Save) ---
        function saveUrl() {
            const url = document.getElementById('sheetsUrlInput').value.trim();
            localStorage.setItem('bhs_sheetsUrl', url);
        }

        function addAthlete() {
            const name = document.getElementById('newName').value.trim();
            if (name && !roster.includes(name)) {
                roster.push(name);
                localStorage.setItem('bhs_roster', JSON.stringify(roster));
                updateRosterUI();
                document.getElementById('newName').value = "";
                alert(name + " added to roster!");
            }
        }

        function clearRoster() {
            if(confirm("Are you sure you want to delete all athletes?")) {
                roster = ["Demo Athlete"];
                localStorage.setItem('bhs_roster', JSON.stringify(roster));
                updateRosterUI();
            }
        }

        function updateRosterUI() {
            const select = document.getElementById('athleteSelect');
            select.innerHTML = roster.map(name => `<option value="${name}">${name}</option>`).join('');
        }

        // --- Bluetooth Connection ---
        async function connectDevice() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Blake_SpeedGate' }],
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const characteristic = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    handleTrigger(val);
                });

                document.getElementById('status').innerHTML = "Status: Gates Connected ✅";
                document.getElementById('connectBtn').style.display = 'none';

                device.addEventListener('gattserverdisconnected', () => {
                    document.getElementById('status').innerHTML = "Status: Disconnected ❌";
                    document.getElementById('connectBtn').style.display = 'block';
                });
            } catch (err) { alert("Connection Error: Check location/Bluetooth permissions."); console.log(err); }
        }

        // --- Timing Logic ---
        function handleTrigger(gate) {
            if (!startTime) {
                // First beam break starts the clock
                startTime = performance.now();
                timerInterval = setInterval(() => {
                    document.getElementById('speedDisplay').innerHTML = ((performance.now() - startTime) / 1000).toFixed(3);
                }, 10);
            } else {
                let time = ((performance.now() - startTime) / 1000).toFixed(3);
                let target = parseInt(document.getElementById('splitTarget').value);
                
                if (target > 0) {
                    // Split Mode: Count breaks on Gate 1
                    splitTimes.push(time);
                    if (splitTimes.length >= target) finishRun(time);
                } else if (gate === "GATE2") {
                    // Standard 2-Gate Mode
                    finishRun(time);
                }
            }
        }

        function finishRun(finalTime) {
            clearInterval(timerInterval);
            
            const athlete = document.getElementById('athleteSelect').value;
            const event = document.getElementById('eventName').value || "Sprint";
            const url = document.getElementById('sheetsUrlInput').value;
            const splitsLog = splitTimes.length > 0 ? splitTimes.join(' / ') : "N/A";

            // Update History Tab
            const tbody = document.getElementById('historyTableBody');
            const row = tbody.insertRow(0);
            row.innerHTML = `<td>${athlete}</td><td>${event}</td><td><strong>${finalTime}s</strong><br><span style="font-size:0.7rem; color:#888;">Splits: ${splitsLog}</span></td>`;

            // Send to Google Sheets
            if (url && url.includes("google.com")) {
                fetch(`${url}?athlete=${encodeURIComponent(athlete)}&event=${encodeURIComponent(event)}&time=${finalTime}&splits=${encodeURIComponent(splitsLog)}`);
            }

            // Auto-reset for the next runner after a 2-second delay so they can see their time
            setTimeout(resetSpeed, 2000); 
        }

        function resetSpeed() {
            clearInterval(timerInterval);
            startTime = null;
            splitTimes = [];
            document.getElementById('speedDisplay').innerHTML = "0.000";
        }
    </script>
</body>
</html>
