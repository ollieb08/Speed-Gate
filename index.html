<!DOCTYPE html>
<html>
<head>
    <title>Blake Speed Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .timer { font-size: 5rem; color: #00ff00; margin: 20px; }
        button { padding: 20px; width: 80%; margin: 10px; border-radius: 10px; font-weight: bold; }
        .log { background: #1e1e1e; padding: 10px; margin: 10px; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>Gate Control</h1>
    <button style="background: #007bff; color: white;" onclick="connect()">CONNECT GATES</button>
    <div id="status">Status: Disconnected</div>
    <div class="timer" id="display">0.000</div>
    <div id="log" class="log">Waiting...</div>
    <button style="background: #ff4444; color: white;" onclick="reset()">RESET</button>

    <script>
        let startTime, interval;
        
        async function connect() {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Blake_SpeedGate' }],
                optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const val = new TextDecoder().decode(e.target.value);
                if (val === "GATE1" && !startTime) {
                    start();
                } else if (val === "GATE2" && startTime) {
                    stop();
                }
            });
            document.getElementById('status').innerText = "Status: Connected ✅";
        }

        function start() {
            startTime = performance.now();
            document.getElementById('log').innerText = "Started!";
            interval = setInterval(() => {
                document.getElementById('display').innerText = ((performance.now() - startTime) / 1000).toFixed(3);
            }, 10);
        }

        function stop() {
            clearInterval(interval);
            const final = ((performance.now() - startTime) / 1000).toFixed(3);
            document.getElementById('log').innerText = "Finished: " + final + "s";
            startTime = null;
        }

        function reset() {
            clearInterval(interval);
            startTime = null;
            document.getElementById('display').innerText = "0.000";
            document.getElementById('log').innerText = "Ready...";
        }
    </script>
</body>
</html>
