<!DOCTYPE html>
<html>
<head>
    <title>SpeedGate Pro Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
        .timer { font-size: 5rem; font-weight: bold; color: #00ff00; font-family: monospace; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-connect { background: #007bff; color: white; }
        .btn-reset { background: #ff4444; color: white; margin-top: 10px; }
        #log { text-align: left; font-family: monospace; font-size: 0.9rem; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>SpeedGate Pro</h2>
    
    <div class="card">
        <button class="btn-connect" onclick="connectBLE()">CONNECT TO GATES</button>
        <select id="athlete">
            <option>Select Athlete...</option>
            <option>William Blake</option>
            <option>Jessica Blake</option>
        </select>
        <label>Number of Splits (Single Gate):</label>
        <input type="number" id="splitTarget" value="0" min="0">
    </div>

    <div class="card">
        <div class="timer" id="display">0.000</div>
        <div id="log">Logs:<br></div>
        <button class="btn-reset" onclick="resetTimer()">RESET</button>
    </div>

    <script>
        let startTime, timerInterval, currentSplits = 0;
        const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyIm2TwOxITXUkLSysGiRvGwx_ld1-52DZcpVf6Lm2bLFuLH2plTHk4F66TVNkBip8/exec
          ";

        async function connectBLE() {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Blake_SpeedGate' }],
                optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            
            char.startNotifications();
            char.addEventListener('characteristicvaluechanged', handleData);
            alert("Connected to Gates!");
        }

        function handleData(event) {
            const val = new TextDecoder().decode(event.target.value);
            const target = parseInt(document.getElementById('splitTarget').value);

            if (!startTime) {
                startTimer();
                log("RUN STARTED");
            } else {
                let time = (performance.now() - startTime) / 1000;
                if (target > 0 && currentSplits < target) {
                    currentSplits++;
                    log(`SPLIT ${currentSplits}: ${time.toFixed(3)}s`);
                    if (currentSplits === target) stopTimer(time);
                } else if (target === 0 && val === "GATE2") {
                    stopTimer(time);
                }
            }
        }

        function startTimer() {
            startTime = performance.now();
            timerInterval = setInterval(() => {
                document.getElementById('display').innerHTML = ((performance.now() - startTime) / 1000).toFixed(3);
            }, 10);
        }

        function stopTimer(finalTime) {
            clearInterval(timerInterval);
            log(`FINAL TIME: ${finalTime.toFixed(3)}s`);
            saveToSheets(finalTime);
        }

        function log(msg) { document.getElementById('log').innerHTML += "> " + msg + "<br>"; }

        function saveToSheets(time) {
            const name = document.getElementById('athlete').value;
            fetch(`${SHEETS_URL}?athlete=${name}&time=${time.toFixed(3)}`);
        }

        function resetTimer() {
            startTime = null;
            currentSplits = 0;
            clearInterval(timerInterval);
            document.getElementById('display').innerHTML = "0.000";
        }
    </script>
</body>
</html>
