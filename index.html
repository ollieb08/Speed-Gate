<!DOCTYPE html>
<html>
<head>
    <title>Blake Health & Strength Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        .header { padding: 20px; background: #1e1e1e; border-bottom: 2px solid #00ff00; margin-bottom: 10px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin: 10px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .big-metric { font-size: 5rem; font-weight: bold; color: #00ff00; font-family: monospace; margin: 10px 0; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 5px 0; transition: 0.2s; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #ff4444; color: white; }
        .btn-green { background: #28a745; color: white; }
        .section-label { display: block; text-align: left; font-size: 0.8rem; color: #888; margin-top: 10px; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; background: #1e1e1e; font-size: 0.8rem;}
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #252525; color: #00ff00; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Blake Health & Strength</h2>
    </div>

    <div class="card">
        <label class="section-label">Google Sheets Web App URL</label>
        <input type="text" id="sheetsUrlInput" placeholder="https://script.google.com/macros/s/..." onchange="saveSettings()">
        
        <button class="btn-blue" id="connectBtn" onclick="connectDevice()">CONNECT SPEED GATES</button>
        <div id="status">Status: Disconnected ❌</div>
    </div>

    <div class="card">
        <input type="text" id="eventName" placeholder="Event Name (e.g. 40yd, 10yd Split)">
        <select id="athleteSelect"></select>
        <input type="text" id="newName" placeholder="Add Athlete Name...">
        <button class="btn-green" style="padding: 10px;" onclick="addAthlete()">Add to Roster</button>
    </div>

    <div class="card">
        <label class="section-label">Target Splits (0 = Gate 2 finishes run)</label>
        <input type="number" id="splitTarget" value="0" min="0">
        <div class="big-metric" id="speedDisplay">0.000</div>
        <button class="btn-red" onclick="resetSpeed()">Reset Timer</button>
    </div>

    <div class="card">
        <strong>Session History</strong>
        <table id="historyTable">
            <thead><tr><th>Athlete</th><th>Event</th><th>Result</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let startTime, timerInterval, splitTimes = [];
        let roster = JSON.parse(localStorage.getItem('roster')) || ["Demo Athlete"];

        // --- Auto-Load & Settings ---
        window.onload = function() {
            const savedUrl = localStorage.getItem('speedGateSheetsUrl');
            if (savedUrl) document.getElementById('sheetsUrlInput').value = savedUrl;
            updateRosterUI();
        };

        function saveSettings() {
            const url = document.getElementById('sheetsUrlInput').value.trim();
            localStorage.setItem('speedGateSheetsUrl', url);
            console.log("Settings Saved Permanently");
        }

        function addAthlete() {
            const name = document.getElementById('newName').value.trim();
            if (name && !roster.includes(name)) {
                roster.push(name);
                localStorage.setItem('roster', JSON.stringify(roster));
                updateRosterUI();
                document.getElementById('newName').value = "";
            }
        }

        function updateRosterUI() {
            const select = document.getElementById('athleteSelect');
            select.innerHTML = roster.map(name => `<option value="${name}">${name}</option>`).join('');
        }

        // --- Bluetooth Logic ---
        async function connectDevice() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Blake_SpeedGate' }],
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const characteristic = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    handleSpeedTrigger(val);
                });

                document.getElementById('status').innerHTML = "Gates Connected ✅";
                document.getElementById('connectBtn').classList.add('hidden');

                device.addEventListener('gattserverdisconnected', () => {
                    document.getElementById('status').innerHTML = "Status: Disconnected ❌";
                    document.getElementById('connectBtn').classList.remove('hidden');
                });
            } catch (err) { alert("Connection Error: " + err); }
        }

        // --- Speed Logic ---
        function handleSpeedTrigger(gate) {
            if (!startTime) {
                // START TIMER (Always Gate 1)
                startTime = performance.now();
                timerInterval = setInterval(() => {
                    document.getElementById('speedDisplay').innerHTML = ((performance.now() - startTime) / 1000).toFixed(3);
                }, 10);
            } else {
                let time = ((performance.now() - startTime) / 1000).toFixed(3);
                let target = parseInt(document.getElementById('splitTarget').value);
                
                if (target > 0) {
                    // SPLIT MODE (Every break counts)
                    splitTimes.push(time);
                    if (splitTimes.length >= target) finishRun(time);
                } else if (gate === "GATE2") {
                    // STANDARD MODE (Waits for Gate 2)
                    finishRun(time);
                }
            }
        }

        function finishRun(finalTime) {
            clearInterval(timerInterval);
            
            const athlete = document.getElementById('athleteSelect').value;
            const event = document.getElementById('eventName').value || "Speed Drill";
            const url = document.getElementById('sheetsUrlInput').value;

            // Log to local table
            const tbody = document.querySelector('#historyTable tbody');
            const row = tbody.insertRow(0);
            row.innerHTML = `<td>${athlete}</td><td>${event}</td><td>${finalTime}s</td>`;

            // Sync to Google Sheets
            if (url && url.includes("google.com")) {
                fetch(`${url}?athlete=${encodeURIComponent(athlete)}&event=${encodeURIComponent(event)}&time=${finalTime}&splits=${splitTimes.join('|')}`);
            }

            resetSpeed();
        }

        function resetSpeed() {
            clearInterval(timerInterval);
            startTime = null;
            splitTimes = [];
            document.getElementById('speedDisplay').innerHTML = "0.000";
        }
    </script>
</body>
</html>
