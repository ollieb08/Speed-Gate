<!DOCTYPE html>
<html>
<head>
    <title>Blake Health & Strength Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        .tabs { display: flex; background: #1e1e1e; margin-bottom: 15px; border-bottom: 2px solid #333; }
        .tab { flex: 1; padding: 15px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: #00ff00; border-bottom: 3px solid #00ff00; background: #252525; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin: 10px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .timer { font-size: 5rem; font-weight: bold; color: #00ff00; font-family: monospace; margin: 10px 0; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 5px 0; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #ff4444; color: white; }
        .btn-green { background: #28a745; color: white; }
        .split-log { color: #aaa; font-size: 0.9rem; margin: 5px 0; text-align: left; background: #151515; padding: 10px; border-radius: 5px; max-height: 100px; overflow-y: auto; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #252525; color: #00ff00; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab1" class="tab active" onclick="switchMode('standard')">2 GATES</div>
        <div id="tab2" class="tab" onclick="switchMode('splits')">SPLITS MODE</div>
    </div>

    <div class="card">
        <button class="btn-blue" id="connectBtn" onclick="connectBLE()">CONNECT GATES</button>
        <div id="status">Status: Disconnected ❌</div>
    </div>

    <div class="card">
        <input type="text" id="eventName" placeholder="Event (e.g. Pro Agility, 5-10-5)">
        <select id="athleteSelect"></select>
        <input type="text" id="newName" placeholder="New Athlete Name...">
        <button class="btn-green" onclick="addAthlete()">ADD ATHLETE</button>
    </div>

    <div class="card">
        <div id="splitInputArea" class="hidden">
            <label>Target Gate 1 breaks (e.g. 3 for Pro-Agility):</label>
            <input type="number" id="splitTarget" value="2" min="1">
        </div>
        <div class="timer" id="display">0.000</div>
        <div id="liveSplits" class="split-log">Waiting for start...</div>
        <button class="btn-red" onclick="resetTimer()">RESET</button>
    </div>

    <div class="card">
        <strong>Session History</strong>
        <table id="historyTable">
            <thead><tr><th>Athlete</th><th>Event</th><th>Result</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let startTime, lastSplitTime, timerInterval, mode = 'standard', splitTimes = [];
        let roster = JSON.parse(localStorage.getItem('roster')) || [];
        const SHEETS_URL = "PASTE_YOUR_NEW_URL_HERE";

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('tab1').className = mode === 'standard' ? 'tab active' : 'tab';
            document.getElementById('tab2').className = mode === 'splits' ? 'tab active' : 'tab';
            document.getElementById('splitInputArea').className = mode === 'splits' ? '' : 'hidden';
            resetTimer();
        }

        function updateRosterUI() {
            const select = document.getElementById('athleteSelect');
            select.innerHTML = roster.map(name => `<option value="${name}">${name}</option>`).join('');
        }
        updateRosterUI();

        function addAthlete() {
            const name = document.getElementById('newName').value.trim();
            if (name && !roster.includes(name)) {
                roster.push(name);
                localStorage.setItem('roster', JSON.stringify(roster));
                updateRosterUI();
                document.getElementById('newName').value = "";
            }
        }

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Blake_SpeedGate' }],
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    handleTrigger(val);
                });
                document.getElementById('status').innerHTML = "Status: Connected ✅";
                document.getElementById('connectBtn').classList.add('hidden');
            } catch (err) { alert("Bluetooth Error: " + err); }
        }

        function handleTrigger(gate) {
            let now = performance.now();
            
            if (!startTime) {
                // STARTING THE TIMER
                startTime = now;
                lastSplitTime = now;
                document.getElementById('liveSplits').innerHTML = "🏃 Running...";
                timerInterval = setInterval(() => {
                    // Show time since LAST split (The "Lap" time)
                    document.getElementById('display').innerHTML = ((performance.now() - lastSplitTime) / 1000).toFixed(3);
                }, 10);
            } else {
                // HANDLING A BEAM BREAK
                let totalElapsed = (now - startTime) / 1000;
                let lapTime = (now - lastSplitTime) / 1000;
                lastSplitTime = now; // Reset the lap anchor to "now"

                if (mode === 'standard' && gate === "GATE2") {
                    stopTimer(totalElapsed.toFixed(3));
                } else if (mode === 'splits') {
                    splitTimes.push(lapTime.toFixed(3));
                    document.getElementById('liveSplits').innerHTML += `<br>Lap ${splitTimes.length}: ${lapTime.toFixed(3)}s (Total: ${totalElapsed.toFixed(3)}s)`;
                    
                    if (splitTimes.length >= parseInt(document.getElementById('splitTarget').value)) {
                        stopTimer(totalElapsed.toFixed(3));
                    }
                }
            }
        }

        function stopTimer(finalTotal) {
            clearInterval(timerInterval);
            document.getElementById('display').innerHTML = finalTotal;
            
            const athlete = document.getElementById('athleteSelect').value;
            const event = document.getElementById('eventName').value || "Drill";
            const resultText = mode === 'splits' ? `${finalTotal}s (Laps: ${splitTimes.join('/')})` : `${finalTotal}s`;
            
            const tbody = document.querySelector('#historyTable tbody');
            const row = tbody.insertRow(0);
            row.innerHTML = `<td>${athlete}</td><td>${event}</td><td>${resultText}</td>`;

            const splitsParam = splitTimes.length > 0 ? splitTimes.join('|') : "";
            fetch(`${SHEETS_URL}?athlete=${encodeURIComponent(athlete)}&event=${encodeURIComponent(event)}&time=${finalTotal}&splits=${splitsParam}`);
        }

        function resetTimer() {
            startTime = null;
            lastSplitTime = null;
            splitTimes = [];
            clearInterval(timerInterval);
            document.getElementById('display').innerHTML = "0.000";
            document.getElementById('liveSplits').innerHTML = "Waiting for start...";
        }
    </script>
</body>
</html>
