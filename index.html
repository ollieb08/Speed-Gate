<!DOCTYPE html>
<html>
<head>
    <title>Blake Health & Strength Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        .timer { font-size: 4.5rem; font-weight: bold; color: #00ff00; font-family: monospace; margin: 10px 0; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 5px 0; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #ff4444; color: white; }
        .btn-green { background: #28a745; color: white; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <h2>Blake Health & Strength</h2>
    
    <div class="card">
        <button class="btn-blue" id="connectBtn" onclick="connectBLE()">CONNECT GATES</button>
        <div id="status">Status: Disconnected</div>
    </div>

    <div class="card">
        <label>Select Athlete:</label>
        <select id="athleteSelect"></select>
        <input type="text" id="newName" placeholder="Add New Athlete Name...">
        <button class="btn-green" onclick="addAthlete()">ADD TO ROSTER</button>
    </div>

    <div class="card">
        <label>Target Splits (0 = Use Gate 2):</label>
        <input type="number" id="splitTarget" value="0" min="0">
        <div class="timer" id="display">0.000</div>
        <button class="btn-red" onclick="resetTimer()">RESET TIMER</button>
    </div>

    <div class="card">
        <strong>Recent Runs</strong>
        <table id="historyTable">
            <tr><th>Name</th><th>Time</th></tr>
        </table>
    </div>

    <script>
        let startTime, timerInterval, currentSplits = 0;
        let roster = JSON.parse(localStorage.getItem('roster')) || [];
        const SHEETS_URL = "https://script.google.com/macros/s/AKfycb...YOUR_ID.../exec";

        // Load Roster on Start
        function updateRosterUI() {
            const select = document.getElementById('athleteSelect');
            select.innerHTML = roster.map(name => `<option value="${name}">${name}</option>`).join('');
        }
        updateRosterUI();

        function addAthlete() {
            const name = document.getElementById('newName').value.trim();
            if (name && !roster.includes(name)) {
                roster.push(name);
                localStorage.setItem('roster', JSON.stringify(roster));
                updateRosterUI();
                document.getElementById('newName').value = "";
            }
        }

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Blake_SpeedGate' }],
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    const target = parseInt(document.getElementById('splitTarget').value);
                    
                    if (!startTime) {
                        startTime = performance.now();
                        timerInterval = setInterval(() => {
                            document.getElementById('display').innerHTML = ((performance.now() - startTime) / 1000).toFixed(3);
                        }, 10);
                    } else {
                        let time = (performance.now() - startTime) / 1000;
                        if (target > 0) { // Split Mode
                            currentSplits++;
                            if (currentSplits >= target) stopTimer(time);
                        } else if (val === "GATE2") { // Standard Mode
                            stopTimer(time);
                        }
                    }
                });
                document.getElementById('status').innerHTML = "Status: Connected ✅";
                document.getElementById('connectBtn').style.display = "none";
            } catch (err) { alert("Connection failed: " + err); }
        }

        function stopTimer(finalTime) {
            clearInterval(timerInterval);
            const athlete = document.getElementById('athleteSelect').value;
            
            // Add to Table
            const table = document.getElementById('historyTable');
            const row = table.insertRow(1);
            row.insertCell(0).innerHTML = athlete;
            row.insertCell(1).innerHTML = finalTime.toFixed(3);

            // Send to Sheets
            fetch(`${SHEETS_URL}?athlete=${encodeURIComponent(athlete)}&time=${finalTime.toFixed(3)}`);
        }

        function resetTimer() {
            startTime = null;
            currentSplits = 0;
            clearInterval(timerInterval);
            document.getElementById('display').innerHTML = "0.000";
        }
    </script>
</body>
</html>
